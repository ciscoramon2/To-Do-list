<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciscotech - To-Do</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" /> -->

    <style>
        *{
            font-family: Georgia, 'Times New Roman', Times, serif;
        }
    </style>

</head>
<body>
    <h1 id="fh" class="text-4xl text-pink-600 m-4 ">Simple To Do App</h1>

    <div id="addEventDiv" class="bg-gray-300 pb-4 max-w-sm m-4 rounded-xl shadow-md">
        <h1 id="sh" class="bg-gray-600 text-white text-xl mb-2 rounded-t-xl px-4 border-b-1 border-gray-800">Add Events</h1>
        <div class="flex items-center justify-center mt-4">
            <input class="bg-white text-pink-500 border rounded-sm p-2 mx-4" type="text" name="event" id="event" placeholder="Enter event">
        <button id="addBtn" class="bg-pink-400 text-white py-2 px-4 rounded-sm text-xl shadow-md hover:bg-pink-500">Add</button>
        </div>
        
    </div>


    <div class="bg-gray-300 pb-4 max-w-sm m-4 rounded-xl shadow-md">
        <h1 id="eventsHeader" class="bg-gray-600 text-white text-xl mb-2 rounded-t-xl px-4 border-b-1 border-gray-800">Events</h1>
        <div class="grid gap-2">
            <div>
                <input type="checkbox" name="event1" id="event1"><span class="checkboxText px-2">Go to Market</span>
            </div>
            <div>
                <input type="checkbox" name="event2" id="event2"><span class="checkboxText px-2">Go to Market</span>
            </div>
            <div>
                <input type="checkbox" name="event3" id="event3"><span class="checkboxText px-2">Go to Market</span>
            </div>
            <div>
                <input type="checkbox" name="event4" id="event4"><span class="checkboxText px-2">Go to Market</span>
            </div>
            
        </div>
    </div>

    <!-- <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script> -->
     <script src="./todo.js"></script>
</body>
</html>
